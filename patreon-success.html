<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patreon Bağlantısı</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 560px;
      width: calc(100vw - 32px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      text-align: center;
    }
    h2 { margin: 0 0 12px; color: #4CAF50; }
    p { margin: 8px 0; opacity: .92; line-height: 1.45; }
    .muted { opacity: .7; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Patreon bağlandı ✅</h2>
    <p id="desc">Uygulamaya dönebilirsin. Bu pencere otomatik kapanmayı deneyecek.</p>
    <p class="muted">Pencere otomatik kapanmazsa elle kapatabilirsin.</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ok = params.get("ok");
      const error = params.get("error");

      const title = document.getElementById("title");
      const desc = document.getElementById("desc");

      if (ok !== "1") {
        title.textContent = "Bağlantı tamamlanamadı";
        desc.textContent = error
          ? "Hata: " + error
          : "İşlem tamamlanamadı. Uygulamaya dönüp tekrar deneyin.";
      }

      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            source: "ets2-patreon-callback",
            ok: ok === "1",
            error: error || null
          }, "*");
        }
      } catch (_) {}

      setTimeout(() => {
        try { window.close(); } catch (_) {}
      }, 1500);
    })();
  </script>
</body>
</html>
