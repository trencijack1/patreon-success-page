<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patreon Connection</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 560px;
      width: calc(100vw - 32px);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      text-align: center;
    }
    h2 { margin: 0 0 12px; color: #4CAF50; }
    p { margin: 8px 0; opacity: .92; line-height: 1.45; }
    .muted { opacity: .7; font-size: 13px; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Connection successful ✅</h2>
    <p id="desc">You can return to the app. This window will close automatically.</p>
    <p class="muted">If it doesn't close, you can close it manually.</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ok = params.get("ok");
      const error = params.get("error");
      const message = params.get("message");
      const subtitle = params.get("subtitle");

      const title = document.getElementById("title");
      const desc = document.getElementById("desc");

      if (ok !== "1") {
        title.textContent = "Connection failed";
        title.classList.add("error");

        if (message) {
          desc.textContent = message;
        } else if (error) {
          desc.textContent = "Error: " + error;
        } else {
          desc.textContent = "Something went wrong. Please try again.";
        }
      } else {
        if (subtitle) {
          desc.textContent = subtitle;
        }
      }

      // Electron app'e mesaj gönder
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            source: "ets2-patreon-callback",
            ok: ok === "1",
            error: error || null
          }, "*");
        }
      } catch (_) {}

      // otomatik kapatma
      setTimeout(() => {
        try { window.close(); } catch (_) {}
      }, 1500);
    })();
  </script>
</body>
</html>
