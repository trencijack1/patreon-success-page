<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patreon Bağlandı</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f0f;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 20px;
    }
    .card {
      width: min(520px, calc(100vw - 32px));
      background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      text-align: center;
    }
    .icon { font-size: 60px; margin-bottom: 16px; }
    h1 { margin: 0 0 10px; font-size: 24px; color: #4CAF50; }
    p { margin: 8px 0; opacity: .9; line-height: 1.5; }
    .muted { opacity: .6; font-size: 14px; margin-top: 16px; }
    .err h1 { color: #ff5f5f; }
    .err { border-color: rgba(255,95,95,.35); }
    code { display:block; margin-top: 16px; text-align: left; white-space: pre-wrap; background: rgba(255,255,255,.04); padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="card" class="card">
    <div id="icon" class="icon">⏳</div>
    <h1 id="title">İşleniyor...</h1>
    <p id="subtitle">Lütfen bekleyin.</p>
    <p class="muted" id="muted">Bu pencere otomatik kapanmayı deneyecek.</p>
    <code id="details" style="display:none"></code>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const ok = qs.get('ok') === '1';
    const type = qs.get('type') || (ok ? 'patreon-connected' : 'patreon-error');
    const title = qs.get('title') || (ok ? 'Patreon bağlandı' : 'Bağlantı hatası');
    const subtitle = qs.get('subtitle') || qs.get('message') || '';

    const card = document.getElementById('card');
    const icon = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const detailsEl = document.getElementById('details');

    titleEl.textContent = title;
    subtitleEl.textContent = subtitle || (ok ? 'Bağlantı tamamlandı.' : 'İşlem tamamlanamadı.');

    if (ok) {
      icon.textContent = '✅';
    } else {
      icon.textContent = '❌';
      card.classList.add('err');
      const msg = qs.get('message');
      if (msg) {
        detailsEl.style.display = 'block';
        detailsEl.textContent = msg;
      }
    }

    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          source: 'ets2-patreon-callback',
          type,
          ok,
          title,
          subtitle,
          message: qs.get('message') || '',
          user: qs.get('user') || '',
          entitled: qs.get('entitled') === '1',
        }, '*');
      }
    } catch (_) {}

    setTimeout(() => {
      try { window.close(); } catch (_) {}
    }, 1500);
  </script>
</body>
</html>
